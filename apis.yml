apis:
  - aid: ambient-mesh:ambient-mesh
    name: Ambient Mesh
    description: >-
      Ambient Mesh provides a sidecar-less service mesh via the Kubernetes
      Gateway API and Istio ambient mode. It exposes configuration APIs for
      traffic management, security policies, resilience settings, and
      observability through standard Kubernetes CRDs including HTTPRoute,
      Gateway, AuthorizationPolicy, and WaypointProxy resources.
    humanURL: https://ambientmesh.io/
