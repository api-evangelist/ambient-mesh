aid: ambient-mesh
name: Ambient Mesh
description: >-
  Ambient Mesh is a sidecar-less service mesh architecture built on Istio that
  simplifies microservices communication, enhances zero-trust security, and
  improves observability without requiring sidecar proxy injection. It uses a
  shared per-node proxy (ztunnel) for zero-trust security and optional waypoint
  proxies for advanced Layer 7 policies, enabling seamless migration from
  sidecar-based meshes with zero downtime.
