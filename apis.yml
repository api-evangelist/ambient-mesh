  - type: Features
    data:
      - name: Sidecar-Less Architecture
        description: >-
          Operates at the platform layer without sidecar proxy injection,
          reducing resource overhead and operational complexity while maintaining
          full service mesh capabilities.
      - name: Zero-Trust Security
        description: >-
          SPIFFE-based workload identity with automatic mutual TLS encryption
          between workloads, certificate management, and zero-trust network
          policies enforced by ztunnel.
      - name: Traffic Management
        description: >-
          Advanced traffic routing, load balancing, traffic splitting, mirroring,
          blue-green deployments, and gateway management via Kubernetes Gateway
          API HTTPRoute resources.
      - name: Resilience
        description: >-
          Zone-aware load balancing, circuit breaking, outlier detection, fault
          injection, timeouts, and retry budgets for high-availability workloads.
      - name: Observability
        description: >-
          Distributed tracing, performance metrics via Prometheus, Kiali
          observability console, and HTTP observability for traffic
          visualization and security verification.
      - name: Zero-Downtime Migration
        description: >-
          Free migration tooling for upgrading from sidecar-based architectures
          with automated workload analysis and risk mitigation for waypoint
          proxy requirements.
      - name: Waypoint Proxies
        description: >-
          Optional per-namespace or per-workload Layer 7 proxies that provide
          advanced policy enforcement without requiring per-pod sidecar
          containers.
  - type: UseCases
    data:
      - name: Microservices Security
        description: >-
          Enforce mutual TLS and zero-trust policies across microservices
          without modifying application code or injecting sidecar proxies.
      - name: Traffic Management
        description: >-
          Implement advanced traffic routing, A/B testing, canary deployments,
          and traffic mirroring across Kubernetes workloads.
      - name: Istio Migration
        description: >-
          Migrate existing Istio sidecar-based deployments to ambient mode with
          zero downtime using the free migration tooling.
      - name: Kubernetes Observability
        description: >-
          Gain full visibility into service-to-service communication with
          metrics, tracing, and traffic visualization via Kiali and Prometheus.
      - name: Multi-Cluster Networking
        description: >-
          Extend ambient mesh policies and security across multiple Kubernetes
          clusters for hybrid and multi-cloud architectures.
  - type: Integrations
    data:
      - name: Istio
        description: >-
          Ambient Mesh is built on Istio ambient mode, using its control plane
          and CRDs for configuration.
      - name: Kubernetes Gateway API
        description: >-
          Uses the standard Kubernetes Gateway API with HTTPRoute, Gateway, and
          GRPCRoute resources for traffic management.
      - name: Prometheus
        description: >-
          Integrates with Prometheus for metrics collection and monitoring of
          mesh traffic and performance.
      - name: Kiali
        description: >-
          Integrates with Kiali for service mesh observability, traffic
          visualization, and security verification.
      - name: Gloo Mesh
        description: >-
          Solo.io's Gloo Mesh provides enterprise-grade ambient mesh management
          for scaling across enterprise workloads.
      - name: OpenShift
        description: >-
          Red Hat OpenShift Service Mesh 3.x supports Istio ambient mode for
          OpenShift deployments.
